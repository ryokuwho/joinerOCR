<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joiner OCR v43 (Save Fix - Stable Overlay)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            touch-action: pan-x pan-y;
        }

        .preview-canvas {
            border: 1px solid #cbd5e1;
            background-image: linear-gradient(45deg, #f1f5f9 25%, transparent 25%), linear-gradient(-45deg, #f1f5f9 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f1f5f9 75%), linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
            background-size: 20px 20px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab;
            transform-origin: top center;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .preview-canvas:active {
            cursor: grabbing;
        }

        #loading.hidden,
        #saveOverlay.hidden,
        #settingsOverlay.hidden {
            display: none !important;
        }

        .loading-overlay,
        .save-overlay,
        .settings-overlay {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 200;
        }

        .vertical-range {
            writing-mode: bt-lr;
            appearance: slider-vertical;
            width: 16px;
            height: 140px;
        }

        .panel-transition {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        .panel-hidden {
            transform: translateY(100%) scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        .scrolling-touch {
            -webkit-overflow-scrolling: touch;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        .processing-glow {
            animation: glow 2s infinite;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(37, 99, 235, 0.5);
            }

            50% {
                box-shadow: 0 0 20px rgba(37, 99, 235, 0.8);
            }
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen font-sans text-slate-900 overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 flex items-center justify-center loading-overlay hidden">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center border border-slate-100 max-w-sm w-full mx-6">
            <div class="relative mb-6">
                <div
                    class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent">
                </div>
                <div id="progressPercent"
                    class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-blue-600">
                </div>
            </div>
            <p id="loadingText" class="font-black text-slate-800 text-lg tracking-tighter italic">画像を生成中</p>
            <p id="loadingSubText" class="text-xs text-slate-400 mt-2 truncate font-medium"></p>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settingsOverlay" class="fixed inset-0 flex items-center justify-center settings-overlay hidden">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 max-w-md w-full mx-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-black text-slate-800 uppercase italic tracking-tighter">Bolt-On Engine Config
                </h3>
                <button onclick="toggleSettings()" class="p-2 bg-slate-100 rounded-full text-slate-400"><svg
                        class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg></button>
            </div>
            <div class="space-y-6">
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex flex-col">
                        <span class="text-xs font-black text-slate-700">デバッグモード</span>
                        <span class="text-[10px] text-slate-400">枠・座標データの可視化</span>
                    </div>
                    <input type="checkbox" id="debugModeCheck" onchange="updateSettings()"
                        class="w-6 h-6 rounded-lg accent-blue-600">
                </div>

                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex flex-col">
                        <span class="text-xs font-black text-slate-700">認識テキストの表示</span>
                        <span class="text-[10px] text-slate-400">一致ボルトと座標値を表示</span>
                    </div>
                    <input type="checkbox" id="showBoxesCheck" onchange="updateSettings()"
                        class="w-6 h-6 rounded-lg accent-emerald-500">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">スキャン範囲 (px)</span>
                        <span id="scanRangeVal" class="text-[10px] font-black text-blue-600">600</span>
                    </div>
                    <input type="range" id="scanRangeSlider" min="200" max="1500" step="50" value="600"
                        oninput="updateSettings()"
                        class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>
        </div>
    </div>

    <!-- Save Overlay (Updated for reliability) -->
    <div id="saveOverlay" class="fixed inset-0 flex flex-col items-center save-overlay hidden">
        <div
            class="w-full p-4 flex items-center justify-between border-b border-slate-100 bg-white sticky top-0 z-30 shadow-sm">
            <div class="flex flex-col">
                <span
                    class="text-[10px] font-black uppercase text-emerald-500 tracking-widest leading-none mb-1">Exporting
                    PNG</span>
                <span class="text-sm font-black text-slate-800 italic">画像を長押し/右クリックして保存</span>
            </div>
            <div class="flex gap-2">
                <button onclick="hideSaveOverlay()"
                    class="bg-slate-900 text-white px-6 py-2 rounded-full text-xs font-black active:scale-95 transition-transform uppercase tracking-tighter italic">戻る</button>
            </div>
        </div>
        <div class="flex-1 overflow-auto p-4 w-full flex flex-col items-center scrolling-touch">
            <img id="resultImage" class="shadow-2xl max-w-full h-auto bg-white border border-slate-200" alt="結合結果">
            <div class="h-32 w-full flex-shrink-0"></div>
        </div>
    </div>

    <!-- Main Viewport -->
    <div class="relative h-screen w-screen overflow-hidden flex flex-col">
        <div id="interactionTip"
            class="absolute top-6 left-1/2 -translate-x-1/2 z-[60] bg-blue-600 text-white text-[10px] px-6 py-2.5 rounded-full font-black shadow-xl transition-opacity opacity-0 pointer-events-none uppercase tracking-[0.2em] flex items-center gap-2">
            <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
            微調整中 (ドラッグ)
        </div>

        <div id="previewContainer"
            class="flex-1 overflow-auto p-4 flex justify-center items-start pt-20 pb-32 scrolling-touch">
            <div id="canvasWrapper" class="relative flex justify-center">
                <canvas id="canvas" class="preview-canvas bg-white"></canvas>
            </div>
        </div>

        <!-- Zoom Bar -->
        <div
            class="absolute right-4 top-1/2 -translate-y-1/2 z-30 flex flex-col items-center gap-4 bg-white/90 backdrop-blur-lg shadow-2xl p-4 rounded-3xl border border-white">
            <button onclick="stepValue('zoomRange', 10)"
                class="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 rounded-2xl text-xl font-bold text-slate-700 active:scale-90 shadow-sm">+</button>
            <div class="h-32 flex flex-col items-center py-2">
                <input type="range" id="zoomRange" min="10" max="200" value="100" class="vertical-range cursor-pointer">
            </div>
            <button onclick="stepValue('zoomRange', -10)"
                class="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 rounded-2xl text-xl font-bold text-slate-700 active:scale-90 shadow-sm">-</button>
            <div id="zoomValue" class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">100%</div>
        </div>

        <!-- Command Hub -->
        <div class="fixed bottom-8 inset-x-0 z-50 px-6 pointer-events-none">
            <div id="hubBar"
                class="max-w-md mx-auto bg-slate-900/95 backdrop-blur-2xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.4)] p-2.5 flex items-center justify-between pointer-events-auto border border-white/10 transition-all">
                <button onclick="document.getElementById('imageInput').click()"
                    class="flex-1 flex flex-col items-center justify-center py-2 text-white hover:text-blue-400 active:scale-90 transition-all">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="text-[8px] font-black uppercase tracking-tighter">追加</span>
                </button>
                <input type="file" id="imageInput" multiple="multiple" accept="image/*" class="hidden">

                <button onclick="togglePanel()"
                    class="flex-1 flex flex-col items-center justify-center py-2 text-white hover:text-blue-400 active:scale-90 transition-all">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M4 6h16M4 12h16M4 18h16" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span class="text-[8px] font-black uppercase tracking-tighter">順序</span>
                </button>

                <button id="ocrAllBtn"
                    class="flex-[1.4] bg-blue-600 text-white rounded-2xl py-3 flex flex-col items-center justify-center shadow-xl active:scale-95 transition-all">
                    <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span class="text-[9px] font-black uppercase tracking-widest italic">Smart Align</span>
                </button>

                <button id="downloadBtn" disabled
                    class="flex-1 flex flex-col items-center justify-center py-2 text-white disabled:opacity-20 hover:text-emerald-400 active:scale-90 transition-all">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="text-[8px] font-black uppercase tracking-tighter">保存</span>
                </button>

                <button onclick="toggleSettings()"
                    class="w-12 flex flex-col items-center justify-center py-2 text-slate-400 hover:text-blue-400 active:scale-90">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                            stroke-width="2.5" />
                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2.5" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Sheet Panel -->
        <div id="mainPanel" class="fixed inset-x-0 bottom-0 z-40 p-4 panel-transition panel-hidden">
            <div
                class="max-w-xl mx-auto bg-white rounded-[2rem] shadow-2xl border border-slate-200 flex flex-col max-h-[75vh]">
                <div class="p-5 border-b border-slate-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-pulse"></div>
                        <h2
                            class="text-xs font-black text-slate-800 tracking-widest uppercase italic tracking-tighter text-[10px]">
                            Image Pipeline</h2>
                    </div>
                    <button onclick="togglePanel()" class="bg-slate-100 p-2 rounded-full text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
                <div class="overflow-y-auto scrolling-touch p-5 space-y-6">
                    <div id="imageList" class="space-y-3">
                        <div
                            class="text-center py-12 border-2 border-dashed border-slate-100 rounded-[1.5rem] text-slate-300 text-xs font-bold uppercase tracking-widest italic tracking-tighter">
                            Queue Empty</div>
                    </div>
                </div>
                <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                    <button id="clearBtn"
                        class="flex items-center gap-2 px-6 py-2 bg-red-50 text-red-500 rounded-full text-[10px] font-black hover:bg-red-100 transition-colors uppercase tracking-widest italic">
                        Reset Workspace
                    </button>
                </div>
            </div>
        </div>

        <div id="toast"
            class="fixed bottom-28 left-1/2 -translate-x-1/2 z-[70] bg-slate-900 text-white px-6 py-2.5 rounded-full shadow-2xl transform translate-y-10 opacity-0 transition-all pointer-events-none text-[10px] font-black uppercase tracking-widest border border-white/20">
        </div>
    </div>

    <script type="module">


        const imageInput = document.getElementById('imageInput');
        const imageList = document.getElementById('imageList');
        const canvas = document.getElementById('canvas');
        const zoomRange = document.getElementById('zoomRange');
        const zoomValue = document.getElementById('zoomValue');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const loadingSubText = document.getElementById('loadingSubText');
        const progressPercent = document.getElementById('progressPercent');
        const ocrAllBtn = document.getElementById('ocrAllBtn');
        const toast = document.getElementById('toast');
        const interactionTip = document.getElementById('interactionTip');
        const previewContainer = document.getElementById('previewContainer');
        const mainPanel = document.getElementById('mainPanel');
        const hubBar = document.getElementById('hubBar');
        const saveOverlay = document.getElementById('saveOverlay');
        const resultImage = document.getElementById('resultImage');
        const settingsOverlay = document.getElementById('settingsOverlay');

        let settings = { debugMode: false, showBoxes: false, scanRange: 600 };

        window.toggleSettings = () => { if (settingsOverlay) settingsOverlay.classList.toggle('hidden'); };
        window.updateSettings = () => {
            const debugCheck = document.getElementById('debugModeCheck');
            const boxCheck = document.getElementById('showBoxesCheck');
            const rangeSlider = document.getElementById('scanRangeSlider');
            if (debugCheck) settings.debugMode = debugCheck.checked;
            if (boxCheck) settings.showBoxes = boxCheck.checked;
            if (rangeSlider) {
                settings.scanRange = parseInt(rangeSlider.value);
                const valDisplay = document.getElementById('scanRangeVal');
                if (valDisplay) valDisplay.textContent = settings.scanRange;
            }
            debouncedRender();
        };

        let images = [];
        let activeProcessId = 0;
        let ocrWorker = null;
        let isStitchedMode = false;
        let dragInfo = { isDragging: false, index: -1, startY: 0, startOffset: 0 };
        let drawInstructions = [];

        function showToast(msg) {
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => { if (toast) toast.classList.add('translate-y-10', 'opacity-0'); }, 3000);
        }

        window.togglePanel = () => { if (mainPanel) mainPanel.classList.toggle('panel-hidden'); };
        window.hideSaveOverlay = () => { if (saveOverlay) saveOverlay.classList.add('hidden'); if (resultImage) resultImage.src = ''; };



        function syncValue(id, val) {
            if (id === 'zoomRange') {
                if (zoomValue) zoomValue.textContent = val + '%';
                if (canvas) canvas.style.transform = `scale(${val / 100})`;
            }
            debouncedRender();
        }

        window.stepValue = (id, delta) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.value = Math.max(10, Math.min(200, parseInt(el.value) + delta));
            syncValue(id, el.value);
        };

        imageInput.addEventListener('change', handleImageUpload);
        zoomRange.addEventListener('input', (e) => syncValue('zoomRange', e.target.value));

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('touchstart', (e) => { startDrag(e.touches[0]); }, { passive: false });
        window.addEventListener('touchmove', (e) => { if (dragInfo.isDragging) { e.preventDefault(); onDrag(e.touches[0]); } }, { passive: false });
        window.addEventListener('touchend', stopDrag);

        function startDrag(e) {
            if (!isStitchedMode || images.length < 1) return;
            const rect = canvas.getBoundingClientRect();
            const scale = parseFloat(zoomRange.value) / 100;
            const clickY = (e.clientY - rect.top) / scale;
            const targetIdx = drawInstructions.findIndex((inst, i) => i > 0 && clickY >= inst.dy && clickY <= inst.dy + inst.sh);
            if (targetIdx !== -1) {
                dragInfo = { isDragging: true, index: targetIdx, startY: e.clientY, startOffset: images[targetIdx].offset };
                if (interactionTip) interactionTip.classList.remove('opacity-0');
            }
        }

        function onDrag(e) {
            if (!dragInfo.isDragging) return;
            const scale = parseFloat(zoomRange.value) / 100;
            const deltaY = (e.clientY - dragInfo.startY) / scale;
            images[dragInfo.index].offset = dragInfo.startOffset - Math.round(deltaY);
            updateImageList();
            debouncedRender();
        }

        function stopDrag() {
            if (dragInfo.isDragging) {
                dragInfo.isDragging = false;
                if (interactionTip) interactionTip.classList.add('opacity-0');
                debouncedRender();
            }
        }

        clearBtn.addEventListener('click', () => {
            activeProcessId++; images = []; isStitchedMode = false;
            updateImageList(); if (canvas) { canvas.width = 0; canvas.height = 0; }
            updateLoading(false); showToast("Workspace Reset");
        });

        function updateLoading(show, text = "") {
            if (show) {
                if (loading) loading.classList.remove('hidden');
                if (loadingText) loadingText.textContent = text;
                if (hubBar) hubBar.classList.add('processing-glow');
            } else {
                if (loading) loading.classList.add('hidden');
                if (progressPercent) progressPercent.textContent = "";
                if (hubBar) hubBar.classList.remove('processing-glow');
            }
        }

        let renderTimeout;
        function debouncedRender() {
            clearTimeout(renderTimeout);
            if (images.length === 0) return;
            renderTimeout = setTimeout(requestRender, 20);
        }

        async function requestRender() {
            const processId = ++activeProcessId;
            if (images.length === 0) { if (processId === activeProcessId) updateLoading(false); return; }
            try { await render(processId); } finally { if (processId === activeProcessId) updateLoading(false); }
        }

        function autoFitZoom() {
            if (images.length === 0 || !canvas || canvas.width === 0 || canvas.height === 0) return;
            const availableW = previewContainer.clientWidth - 60;
            const availableH = previewContainer.clientHeight - 60;
            const fitZoom = Math.max(10, Math.min(100, Math.floor(Math.min(availableW / canvas.width, availableH / canvas.height) * 100)));
            zoomRange.value = fitZoom;
            syncValue('zoomRange', fitZoom);
        }

        async function handleImageUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            updateLoading(true, "Loading Assets");
            try {
                for (let file of files) {
                    if (loadingSubText) loadingSubText.textContent = file.name;
                    const img = await loadImage(file);
                    images.push({
                        id: Math.random(), file, imgElement: img, name: file.name,
                        offset: 0, ocrResult: null,
                        autoTrim: { top: 120, bottom: img.height - 120 },
                        anchors: { start: null, end: null },
                        matchScore: 0
                    });
                }
                isStitchedMode = false; updateImageList(); await requestRender(); autoFitZoom();
                showToast(`Loaded ${files.length} images`);
            } catch (err) { showToast("Load Error"); } finally { imageInput.value = ''; updateLoading(false); }
        }

        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => { const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = e.target.result; };
                reader.onerror = reject; reader.readAsDataURL(file);
            });
        }

        async function getOCRWorker() {
            if (ocrWorker) return ocrWorker;
            ocrWorker = await Tesseract.createWorker('jpn+eng', 1, { logger: m => { if (m.status === 'recognizing text') { const prog = Math.round(m.progress * 100); if (progressPercent) progressPercent.textContent = `${prog}%`; if (loadingSubText) loadingSubText.textContent = `Analyzing: ${prog}%`; } } });
            return ocrWorker;
        }

        const dateRegex = /(\d{4}年)?\d{1,2}月\d{1,2}日/;

        // --- BOLT-ON LOGIC: ALIGN TRIM COORDINATES ---
        function findBestBoltAnchor(imgA, imgB, ocrBottomA, ocrTopB) {
            const scanRange = settings.scanRange;
            if (!ocrBottomA || !ocrTopB) return null;

            for (const lineB of ocrTopB.lines) {
                const cleanB = lineB.text.replace(/\s+/g, '');
                if (cleanB.length < 4 || lineB.bbox.y0 < 40) continue;

                const matchA = ocrBottomA.lines.find(l => l.text.replace(/\s+/g, '') === cleanB);
                if (matchA) {
                    return {
                        text: cleanB,
                        absY_A: (imgA.height - scanRange) + matchA.bbox.y0,
                        absY_B: lineB.bbox.y0,
                        boxA: matchA.bbox,
                        boxB: lineB.bbox
                    };
                }
            }
            return null;
        }

        async function analyzeHybrid(index) {
            if (!images[index]) return;
            const item = images[index];
            item.ocrPending = true; updateImageList();

            try {
                const worker = await getOCRWorker();
                const scanH = settings.scanRange;
                const tmpCanvas = document.createElement('canvas');
                tmpCanvas.width = item.imgElement.width; tmpCanvas.height = scanH;
                const tmpCtx = tmpCanvas.getContext('2d');

                tmpCtx.drawImage(item.imgElement, 0, 0, item.imgElement.width, scanH, 0, 0, item.imgElement.width, scanH);
                const ocrTop = await worker.recognize(tmpCanvas.toDataURL());
                item.ocrTopResult = ocrTop.data;

                const firstDate = ocrTop.data.lines.find(l => dateRegex.test(l.text.replace(/\s+/g, '')));
                item.autoTrim.top = firstDate ? firstDate.bbox.y0 : 130;
                if (firstDate) item.anchors.start = firstDate.text.replace(/\s+/g, '').substring(0, 12);

                tmpCtx.clearRect(0, 0, item.imgElement.width, scanH);
                tmpCtx.drawImage(item.imgElement, 0, item.imgElement.height - scanH, item.imgElement.width, scanH, 0, 0, item.imgElement.width, scanH);
                const ocrBottom = await worker.recognize(tmpCanvas.toDataURL());
                item.ocrBottomResult = ocrBottom.data;

                const lastDate = ocrBottom.data.lines.sort((a, b) => b.bbox.y1 - a.bbox.y1).find(l => dateRegex.test(l.text.replace(/\s+/g, '')));
                item.autoTrim.bottom = lastDate ? (item.imgElement.height - scanH) + lastDate.bbox.y1 : item.imgElement.height - 120;

                if (index > 0) {
                    const prev = images[index - 1];
                    const anchor = findBestBoltAnchor(prev.imgElement, item.imgElement, prev.ocrBottomResult, item.ocrTopResult);

                    if (anchor) {
                        const trimY_Bolt_A = anchor.absY_A - prev.autoTrim.top;
                        const trimY_Bolt_B = anchor.absY_B - item.autoTrim.top;
                        const sH_A = prev.autoTrim.bottom - prev.autoTrim.top;
                        item.offset = sH_A - trimY_Bolt_A + trimY_Bolt_B;
                        item.boltText = anchor.text;
                    } else {
                        const width = prev.imgElement.width;
                        const canvasA = document.createElement('canvas');
                        const canvasB = document.createElement('canvas');
                        canvasA.width = width; canvasA.height = scanH;
                        canvasB.width = width; canvasB.height = scanH;
                        const ctxA = canvasA.getContext('2d');
                        const ctxB = canvasB.getContext('2d');
                        ctxA.drawImage(prev.imgElement, 0, prev.imgElement.height - scanH, width, scanH, 0, 0, width, scanH);
                        ctxB.drawImage(item.imgElement, 0, 0, width, scanH, 0, 0, width, scanH);
                        const dataA = ctxA.getImageData(0, 0, width, scanH).data;
                        const dataB = ctxB.getImageData(0, 0, width, scanH).data;

                        let minDiff = Infinity; let bestO = 40;
                        for (let o = 40; o < scanH - 80; o++) {
                            let diff = 0; let samples = 0;
                            for (let y = 0; y < o; y += 4) {
                                const rowA = (scanH - o + y) * width * 4;
                                const rowB = y * width * 4;
                                for (let x = Math.floor(width * 0.3); x < Math.floor(width * 0.7); x += 40) {
                                    const idxA = rowA + x * 4; const idxB = rowB + x * 4;
                                    diff += Math.abs(dataA[idxA] - dataB[idxB]); samples++;
                                }
                            }
                            const score = diff / samples;
                            if (score < minDiff) { minDiff = score; bestO = o; }
                        }
                        item.offset = bestO - item.autoTrim.top;
                        item.boltText = null;
                    }
                }
            } finally { item.ocrPending = false; updateImageList(); }
        }

        ocrAllBtn.onclick = async () => {
            if (images.length === 0) return;
            updateLoading(true, "Aligning Trim Coords");
            try {
                for (let i = 0; i < images.length; i++) {
                    if (loadingText) loadingText.textContent = `Syncing (${i + 1}/${images.length})`;
                    await analyzeHybrid(i);
                }
                isStitchedMode = true; if (mainPanel && !mainPanel.classList.contains('panel-hidden')) togglePanel();
                showToast("Align Success");
            } finally { updateLoading(false); debouncedRender(); autoFitZoom(); }
        };

        function updateImageList() {
            if (!imageList) return;
            imageList.innerHTML = '';
            images.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `flex flex-col bg-white p-4 rounded-[1.25rem] border ${item.ocrPending ? 'border-blue-500 shadow-blue-50' : 'border-slate-100'} shadow-sm`;
                div.innerHTML = `<div class="flex items-center justify-between"><div class="flex items-center gap-3 truncate"><span class="text-[10px] font-black text-slate-300">#${index + 1}</span><div class="flex flex-col truncate"><span class="text-[11px] font-black text-slate-700 truncate">${item.name}</span><span class="text-[8px] font-bold text-blue-400 uppercase tracking-tighter">${item.anchors.start || 'Auto'}</span></div></div><div class="flex items-center gap-2"><div class="flex items-center bg-slate-50 rounded-xl border border-slate-100 p-1"><button onclick="move(${index}, -1)" class="p-2 text-slate-400" ${index === 0 ? 'disabled' : ''}>↑</button><button onclick="move(${index}, 1)" class="p-2 text-slate-400" ${index === images.length - 1 ? 'disabled' : ''}>↓</button></div><button onclick="remove(${index})" class="p-2 text-red-400">✕</button></div></div>`;
                imageList.appendChild(div);
            });
            if (downloadBtn) downloadBtn.disabled = images.length === 0 || !isStitchedMode;
        }

        window.move = (index, dir) => { const t = index + dir; if (t < 0 || t >= images.length) return;[images[index], images[t]] = [images[t], images[index]]; updateImageList(); requestRender(); };
        window.remove = (index) => { images.splice(index, 1); updateImageList(); requestRender(); };

        async function render(processId) {
            if (images.length === 0 || !canvas) return;
            const baseW = images[0].imgElement.width;
            const ctx = canvas.getContext('2d', { alpha: false });
            if (!isStitchedMode) {
                const cols = Math.ceil(Math.sqrt(images.length)); const rows = Math.ceil(images.length / cols);
                const padding = 50; const cellW = baseW; const cellH = images[0].imgElement.height;
                canvas.width = cols * (cellW + padding) + padding; canvas.height = rows * (cellH + padding) + padding;
                ctx.fillStyle = "#f8fafc"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                images.forEach((img, i) => { const r = Math.floor(i / cols); const c = i % cols; ctx.drawImage(img.imgElement, padding + c * (cellW + padding), padding + r * (cellH + padding), cellW, cellH); });
            } else {
                let currentY = 0; drawInstructions = [];
                for (let i = 0; i < images.length; i++) {
                    const item = images[i]; const sTop = item.autoTrim.top; const sBottom = item.autoTrim.bottom; const sH = Math.max(0, sBottom - sTop);
                    if (i > 0) currentY -= item.offset;
                    drawInstructions.push({ imgObj: item, sy: sTop, sh: sH, dy: currentY });
                    currentY += sH;
                }
                canvas.width = baseW; canvas.height = Math.max(1, currentY); ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawInstructions.forEach((d, i) => {
                    const isGrabbing = (dragInfo.isDragging && i === dragInfo.index);
                    const isBehind = (dragInfo.isDragging && i === dragInfo.index - 1);
                    ctx.save();
                    if (isGrabbing) {
                        ctx.globalAlpha = 0.5;
                        ctx.drawImage(d.imgObj.imgElement, 0, d.sy, d.imgObj.imgElement.width, d.sh, 0, d.dy, baseW, d.sh);
                        ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 15; ctx.strokeRect(0, d.dy, baseW, d.sh);
                    } else if (isBehind) {
                        ctx.globalAlpha = 1.0;
                        const fullH = d.imgObj.imgElement.height - d.sy;
                        ctx.drawImage(d.imgObj.imgElement, 0, d.sy, d.imgObj.imgElement.width, fullH, 0, d.dy, baseW, fullH);
                        ctx.strokeStyle = "#10b981"; ctx.lineWidth = 15; ctx.strokeRect(0, d.dy, baseW, d.sh);
                    } else {
                        ctx.globalAlpha = 1.0;
                        ctx.drawImage(d.imgObj.imgElement, 0, d.sy, d.imgObj.imgElement.width, d.sh, 0, d.dy, baseW, d.sh);
                    }
                    if (settings.debugMode) {
                        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(10, d.dy + 10, 320, 60);
                        ctx.fillStyle = d.imgObj.boltText ? "#facc15" : "white"; ctx.font = "bold 16px monospace";
                        ctx.fillText(`IMG #${i + 1} ${d.imgObj.boltText ? '[BOLTED]' : '[PIXEL]'}`, 20, d.dy + 35);
                        ctx.font = "10px monospace"; ctx.fillStyle = "rgba(255,255,255,0.7)";
                        ctx.fillText(`Offset: ${Math.round(d.imgObj.offset)}px (Match: ${d.imgObj.boltText || 'N/A'})`, 20, d.dy + 52);
                        if (settings.showBoxes) {
                            ctx.font = "12px sans-serif";
                            if (d.imgObj.ocrBottomResult) {
                                const bSnippetStart = d.imgObj.imgElement.height - settings.scanRange;
                                d.imgObj.ocrBottomResult.lines.forEach(l => {
                                    const absY_orig = bSnippetStart + l.bbox.y0;
                                    const y_trim = d.dy + (absY_orig - d.sy);
                                    const h = l.bbox.y1 - l.bbox.y0;
                                    const norm = l.text.replace(/\s+/g, '');
                                    const nextImg = images[i + 1];
                                    const isBolt = nextImg && nextImg.boltText && norm === nextImg.boltText;

                                    if (isBolt) {
                                        ctx.fillStyle = "rgba(254, 240, 138, 0.4)";
                                        ctx.fillRect(l.bbox.x0, y_trim, l.bbox.x1 - l.bbox.x0, h);
                                        ctx.strokeStyle = "#facc15"; ctx.lineWidth = 3;
                                        ctx.fillStyle = "#000000"; ctx.font = "bold 10px monospace";
                                        ctx.fillText(`Orig: (${l.bbox.x0}, ${absY_orig})`, l.bbox.x0, y_trim - 15);
                                        ctx.fillText(`Trim: (${l.bbox.x0}, ${Math.round(y_trim)})`, l.bbox.x0, y_trim - 5);
                                    } else {
                                        ctx.strokeStyle = "rgba(0, 100, 255, 0.4)"; ctx.lineWidth = 1;
                                    }
                                    ctx.strokeRect(l.bbox.x0, y_trim, l.bbox.x1 - l.bbox.x0, h);
                                    ctx.fillStyle = isBolt ? "#c2410c" : "rgba(0, 100, 255, 0.8)";
                                    ctx.fillText(norm, l.bbox.x1 + 5, y_trim + h / 2 + 5);
                                });
                            }
                            if (d.imgObj.ocrTopResult) {
                                d.imgObj.ocrTopResult.lines.forEach(l => {
                                    const absY_orig = l.bbox.y0;
                                    const y_trim = d.dy + (absY_orig - d.sy);
                                    const h = l.bbox.y1 - l.bbox.y0;
                                    const norm = l.text.replace(/\s+/g, '');
                                    const isBolt = d.imgObj.boltText && norm === d.imgObj.boltText;

                                    if (isBolt) {
                                        ctx.fillStyle = "rgba(254, 240, 138, 0.4)";
                                        ctx.fillRect(l.bbox.x0, y_trim, l.bbox.x1 - l.bbox.x0, h);
                                        ctx.strokeStyle = "#facc15"; ctx.lineWidth = 3;
                                        ctx.fillStyle = "#000000"; ctx.font = "bold 10px monospace";
                                        ctx.fillText(`Orig: (${l.bbox.x0}, ${absY_orig})`, l.bbox.x0, y_trim - 15);
                                        ctx.fillText(`Trim: (${l.bbox.x0}, ${Math.round(y_trim)})`, l.bbox.x0, y_trim - 5);
                                    } else {
                                        ctx.strokeStyle = "rgba(255, 0, 0, 0.4)"; ctx.lineWidth = 1;
                                    }
                                    ctx.strokeRect(l.bbox.x0, y_trim, l.bbox.x1 - l.bbox.x0, h);
                                    ctx.fillStyle = isBolt ? "#c2410c" : "rgba(255, 0, 0, 0.8)";
                                    ctx.fillText(norm, l.bbox.x1 + 5, y_trim + h / 2 + 5);
                                });
                            }
                        }
                    }
                    ctx.restore();
                });
            }
        }

        // --- STABLE EXPORT LOGIC ---
        downloadBtn.onclick = () => {
            if (!isStitchedMode || !canvas || canvas.height <= 1) return;
            updateLoading(true, "PNG作成中");

            // ポップアップ制限を回避するため、必ずアプリ内のオーバーレイを表示する
            setTimeout(() => {
                try {
                    const dataUrl = canvas.toDataURL('image/png');
                    if (resultImage) {
                        resultImage.src = dataUrl;
                        if (saveOverlay) saveOverlay.classList.remove('hidden');
                        showToast("保存の準備ができました");
                    }
                } catch (e) {
                    showToast("保存エラー: 画像が巨大すぎます");
                    console.error(e);
                } finally {
                    updateLoading(false);
                }
            }, 100);
        };

        window.addEventListener('resize', autoFitZoom);
        window.onload = () => debouncedRender();
    </script>
</body>
